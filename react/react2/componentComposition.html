<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- react algorithm -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- react dom algorithm -->
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- transpiler -> translator  -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<style>
    * {
        text-align: center;
        margin-bottom: 2rem;
    }
</style>

<body>
    <h1>state wala component composition</h1>
    <div id="root">

    </div>
    <script type="text/babel">
        const rootElement = document.getElementById('root');

        // functions that returns -> html

        function Counter(props) {
            // create a state for that 
            const [value, setValue] = 
            React.useState(props.initialValue);
            // // jb bhi update -> react will know ki kuch update hona h 
            // const value = arr[0]; 
            // // the function that is given to you by react
            // const setValue = arr[1];
            const handleIncrement = () => {
                if (value == 100) {
                    return;
                }
                setValue(value + 1);// cant write value ++ becaue pta nhi chalega ki kya krna hai  
            }
            const handleDecrement = () => {
                if (value == -10)
                    return
                setValue(value - 1);
            }
            return <div>
                <div>{value}</div>
                <button onClick={handleIncrement}>+ Plus</button>
                <button onClick={handleDecrement}>- Minus</button>
            </div>

        }
        // lets suppose  we want 3 counters 
        function CounterParent() {
            return <div>
                <Counter initialValue ={1}></Counter>
                <Counter initialValue ={2}></Counter>
                <Counter initialValue ={3}></Counter>
            </div>
        }
        // ReactDOM-> 1
        ReactDOM.render(<CounterParent></CounterParent>, rootElement)

    </script>
</body>

</html>
