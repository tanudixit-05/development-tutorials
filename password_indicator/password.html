<!DOCTYPE html>
<html>
	<head>
		<title>Password Strength Indicator Lab</title>
		<style>
		body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

#strength-bar {
    width: 100%;
    height: 10px;
    background: #ddd;
    margin-top: 10px;
    border-radius: 5px;
}

#bar {
    height: 100%;
    width: 0%;
    border-radius: 5px;
    transition: 0.3s;
}

#strength-text {
    margin-top: 10px;
    font-weight: bold;
}
		</style>
	</head>
	<body>
		<h1>Password Strength Indicator Lab</h1>
		<label for="password">Enter a password:</label>
		<input type="password" id="password" />
		<p id="strength">
			Password Strength: <span id="strengthIndicator">Weak</span>
		</p>
		<script src="script.js"></script>
	</body>
</html>
